<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>ShopFood</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f4f4;
margin:0;
padding:30px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
}

input{
padding:8px;
margin:5px 0;
width:200px;
}

button{
padding:8px 12px;
margin-top:5px;
cursor:pointer;
border:none;
background:#3498db;
color:white;
border-radius:5px;
}

button:hover{
background:#2980b9;
}

#dashboard{
display:none;
margin-top:20px;
}

table{
border-collapse:collapse;
width:100%;
margin-top:15px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#3498db;
color:white;
}

.buyBtn{
background:#2ecc71;
}

.buyBtn:hover{
background:#27ae60;
}

.balanceBox{
margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<h2>Регистрация</h2>

<input id="regName" placeholder="Имя"><br>
<input id="regPassword" type="password" placeholder="Пароль"><br>

<button onclick="register()">Зарегистрироваться</button>

<p id="regResult"></p>



<h2>Вход</h2>

<input id="loginName" placeholder="Имя"><br>
<input id="loginPassword" type="password" placeholder="Пароль"><br>

<button onclick="login()">Войти</button>

<p id="loginResult"></p>



<div id="dashboard">

<h2>Личный кабинет</h2>

<p><b>Имя:</b> <span id="userName"></span></p>
<p><b>Баланс:</b> <span id="userBalance"></span></p>

<div class="balanceBox">

<h3>Пополнить баланс</h3>

<input id="balanceInput" placeholder="Сумма">

<button onclick="addBalance()">Пополнить</button>

</div>

<hr>

<h3>Список еды</h3>

<button onclick="loadFood()">Обновить список</button>

<table>

<thead>
<tr>
<th>ID</th>
<th>Название</th>
<th>Тип</th>
<th>Цена</th>
<th>Купить</th>
</tr>
</thead>

<tbody id="foodTable"></tbody>

</table>

</div>

</div>

<script>

let currentUser = null;



async function register(){

const name = document.getElementById("regName").value;
const password = document.getElementById("regPassword").value;

const response = await fetch("/api/costumers/registration",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,password})

});

if(!response.ok){

document.getElementById("regResult").innerText="Ошибка регистрации";
return;

}

document.getElementById("regResult").innerText="Пользователь создан";

}



async function login(){

const name = document.getElementById("loginName").value;
const password = document.getElementById("loginPassword").value;

const response = await fetch("/api/costumers/login",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,password})

});

if(!response.ok){

document.getElementById("loginResult").innerText="Ошибка входа";
return;

}

currentUser = await response.json();

document.getElementById("userName").innerText=currentUser.name;
document.getElementById("userBalance").innerText=currentUser.balance;

document.getElementById("dashboard").style.display="block";

loadFood();

}



async function loadFood(){

const response = await fetch("/api/foods");

const foods = await response.json();

const table = document.getElementById("foodTable");

table.innerHTML="";

foods.forEach(food=>{

const id = food.idcode ?? food.Idcode;

const row = document.createElement("tr");

row.innerHTML=`
<td>${id}</td>
<td>${food.nameFood}</td>
<td>${food.type}</td>
<td>${food.price}</td>
<td><button class="buyBtn" onclick="buyFood(${id})">Buy</button></td>
`;

table.appendChild(row);

});

}



async function buyFood(foodId){

const response = await fetch(
"/api/orders/buy?costumerId="+currentUser.id+"&foodId="+foodId,
{method:"POST"}
);

if(!response.ok){

alert("Ошибка покупки или недостаточно денег");
return;

}

alert("Покупка успешна");

updateBalance();

}



async function addBalance(){

const amount = document.getElementById("balanceInput").value;

const response = await fetch(
"/api/costumers/addBalance?id="+currentUser.id+"&balance="+amount,
{method:"POST"}
);

if(!response.ok){

alert("Ошибка пополнения");
return;

}

alert("Баланс пополнен");

updateBalance();

}



async function updateBalance(){

const response = await fetch("/api/costumers/dtoCostumer/"+currentUser.id);

const user = await response.json();

currentUser.balance = user.balance;

document.getElementById("userBalance").innerText=user.balance;

}

</script>

</body>

</html>
