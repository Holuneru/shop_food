<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shop Food</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        input { margin: 5px 0; padding: 5px; width: 200px; }
        button { padding: 5px 10px; margin-top: 10px; }
        #loginSection, #regSection, #cabinetSection { margin-bottom: 30px; }
        #cabinetSection { display: none; border-top: 1px solid #ccc; padding-top: 20px; }
    </style>
</head>
<body>

    <h1>Shop Food App</h1>

    <!-- Registration -->
    <div id="regSection">
        <h2>Registration</h2>
        <input type="text" id="regName" placeholder="Name"><br>
        <input type="password" id="regPassword" placeholder="Password"><br>
        <button onclick="register()">Register</button>
        <div id="regResult"></div>
    </div>

    <!-- Login -->
    <div id="loginSection">
        <h2>Login</h2>
        <input type="text" id="loginName" placeholder="Name"><br>
        <input type="password" id="loginPassword" placeholder="Password"><br>
        <button onclick="login()">Login</button>
        <div id="loginResult"></div>
    </div>

    <!-- Personal Cabinet -->
    <div id="cabinetSection">
        <h2>Personal Cabinet</h2>
        <p>Name: <span id="userName"></span></p>
        <p>Balance: $<span id="userBalance"></span></p>
        <button onclick="logout()">Logout</button>
    </div>

    <script>
        // Registration
        async function register() {
            const name = document.getElementById("regName").value;
            const password = document.getElementById("regPassword").value;
            const regResult = document.getElementById("regResult");

            if (!name || !password) {
                regResult.innerText = "Enter name and password";
                return;
            }

            try {
                const response = await fetch("/ShopFood/registration", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, password })
                });

                if (!response.ok) {
                    regResult.innerText = "Registration failed";
                    return;
                }

                const user = await response.json();
                regResult.innerText = `Registered successfully: ${user.name}, Balance: ${user.balance}`;
            } catch (err) {
                regResult.innerText = "Error during registration";
            }
        }

        // Login
        async function login() {
            const name = document.getElementById("loginName").value;
            const password = document.getElementById("loginPassword").value;
            const loginResult = document.getElementById("loginResult");

            if (!name || !password) {
                loginResult.innerText = "Enter name and password";
                return;
            }

            try {
                // Бэкенд у тебя пока нет отдельного login-метода, поэтому для теста используем fetch всех пользователей
                const response = await fetch(`/ShopFood/api/costumers`);
                if (!response.ok) {
                    loginResult.innerText = "Login failed";
                    return;
                }

                const users = await response.json();
                const user = users.find(u => u.name === name && u.password === password);

                if (!user) {
                    loginResult.innerText = "Invalid name or password";
                    return;
                }

                // Показ кабинета
                document.getElementById("userName").innerText = user.name;
                document.getElementById("userBalance").innerText = user.balance;
                document.getElementById("cabinetSection").style.display = "block";
                document.getElementById("loginSection").style.display = "none";
                document.getElementById("regSection").style.display = "none";
            } catch (err) {
                loginResult.innerText = "Error during login";
            }
        }

        // Logout
        function logout() {
            document.getElementById("cabinetSection").style.display = "none";
            document.getElementById("loginSection").style.display = "block";
            document.getElementById("regSection").style.display = "block";
            document.getElementById("loginResult").innerText = "";
        }
    </script>

</body>
</html>
