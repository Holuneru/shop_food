<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>ShopFood</title>

<style>

body{
font-family:Arial;
margin:30px;
}

input{
margin:4px;
padding:6px;
}

button{
padding:6px;
margin:4px;
}

#dashboard{
display:none;
margin-top:20px;
}

table{
border-collapse:collapse;
margin-top:10px;
}

td,th{
border:1px solid black;
padding:6px;
}

</style>

</head>

<body>

<h2>Регистрация</h2>

<input id="regName" placeholder="Name">
<input id="regPassword" type="password" placeholder="Password">
<button onclick="register()">Register</button>

<p id="regResult"></p>



<h2>Login</h2>

<input id="loginName" placeholder="Name">
<input id="loginPassword" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<p id="loginResult"></p>



<div id="dashboard">

<h2>Личный кабинет</h2>

<p>Имя: <span id="userName"></span></p>
<p>Баланс: <span id="userBalance"></span></p>

<hr>

<h3>Список еды</h3>

<button onclick="loadFood()">Обновить список</button>

<table>

<thead>

<tr>
<th>ID</th>
<th>Название</th>
<th>Тип</th>
<th>Цена</th>
<th>Купить</th>
</tr>

</thead>

<tbody id="foodTable"></tbody>

</table>

</div>



<script>

let currentUser=null;



async function register(){

const name=document.getElementById("regName").value;
const password=document.getElementById("regPassword").value;

const response = await fetch("/ShopFood/registration",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,password})

});

if(!response.ok){

document.getElementById("regResult").innerText="Ошибка регистрации";
return;

}

document.getElementById("regResult").innerText="Пользователь создан";

}



async function login(){

const name=document.getElementById("loginName").value;
const password=document.getElementById("loginPassword").value;

const response = await fetch("/ShopFood/login",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,password})

});

if(!response.ok){

document.getElementById("loginResult").innerText="Ошибка входа";
return;

}

currentUser = await response.json();

document.getElementById("userName").innerText=currentUser.name;
document.getElementById("userBalance").innerText=currentUser.balance;

document.getElementById("dashboard").style.display="block";

loadFood();

}



async function loadFood(){

const response = await fetch("/ShopFood/getAllListFood?param=all");

const foods = await response.json();

const table=document.getElementById("foodTable");

table.innerHTML="";

foods.forEach(food=>{

const row=document.createElement("tr");

row.innerHTML=`
<td>${food.idcode ?? food.Idcode}</td>
<td>${food.nameFood}</td>
<td>${food.type}</td>
<td>${food.price}</td>
<td><button onclick="buyFood(${food.idcode ?? food.Idcode})">Buy</button></td>
`;

table.appendChild(row);

});

}



async function buyFood(foodId){

const response = await fetch(
"/ShopFood/buy?costumerId="+currentUser.id+"&foodId="+foodId,
{method:"POST"}
);

if(!response.ok){

alert("Недостаточно денег или ошибка покупки");
return;

}

alert("Покупка успешна");

loadFood();
updateBalance();

}



async function updateBalance(){

const response = await fetch("/ShopFood/api/costumers");

const users = await response.json();

const user = users.find(u=>u.id===currentUser.id);

if(user){

currentUser.balance=user.balance;

document.getElementById("userBalance").innerText=user.balance;

}

}

</script>

</body>

</html>
