<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>ShopFood</title>

<style>

body{
font-family:Arial;
margin:30px;
}

input{
margin:5px;
padding:6px;
}

button{
margin:5px;
padding:6px;
}

#dashboard{
display:none;
margin-top:20px;
}

table{
border-collapse:collapse;
margin-top:15px;
}

td,th{
border:1px solid black;
padding:8px;
}

</style>

</head>

<body>

<h2>Регистрация</h2>

<input id="regName" placeholder="Имя">
<input id="regPassword" type="password" placeholder="Пароль">

<button onclick="register()">Зарегистрироваться</button>

<p id="regResult"></p>



<h2>Вход</h2>

<input id="loginName" placeholder="Имя">
<input id="loginPassword" type="password" placeholder="Пароль">

<button onclick="login()">Войти</button>

<p id="loginResult"></p>



<div id="dashboard">

<h2>Личный кабинет</h2>

<p>Имя: <span id="userName"></span></p>
<p>Баланс: <span id="userBalance"></span></p>

<hr>

<h3>Пополнить баланс</h3>

<input id="balanceInput" placeholder="Сумма">

<button onclick="addBalance()">Пополнить</button>

<hr>

<h3>Обновить данные пользователя</h3>

<input id="newName" placeholder="Новое имя">
<input id="newPassword" type="password" placeholder="Новый пароль">

<button onclick="updateUser()">Обновить</button>

<hr>

<h3>Список пользователей (для теста)</h3>

<button onclick="loadUsers()">Обновить список</button>

<table>

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Balance</th>
</tr>

</thead>

<tbody id="usersTable"></tbody>

</table>

</div>



<script>

let currentUser = null;



async function register(){

const name = document.getElementById("regName").value;
const password = document.getElementById("regPassword").value;

const response = await fetch("/api/costumers/registration",{

method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({name,password})

});

if(!response.ok){

document.getElementById("regResult").innerText="Ошибка регистрации";
return;

}

document.getElementById("regResult").innerText="Регистрация успешна";

}



async function login(){

const name = document.getElementById("loginName").value;
const password = document.getElementById("loginPassword").value;

const response = await fetch("/api/costumers/login",{

method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({name,password})

});

if(!response.ok){

document.getElementById("loginResult").innerText="Ошибка входа";
return;

}

currentUser = await response.json();

document.getElementById("userName").innerText=currentUser.name;
document.getElementById("userBalance").innerText=currentUser.balance;

document.getElementById("dashboard").style.display="block";

}



async function addBalance(){

const amount = document.getElementById("balanceInput").value;

const response = await fetch(
"/api/costumers/addBalance?id="+currentUser.id+"&balance="+amount,
{ method:"POST" }
);

if(!response.ok){

alert("Ошибка пополнения");
return;

}

alert("Баланс пополнен");

updateBalance();

}



async function updateBalance(){

const response = await fetch("/api/costumers");

const users = await response.json();

const user = users.find(u => u.id === currentUser.id);

if(user){

currentUser.balance = user.balance;

document.getElementById("userBalance").innerText=user.balance;

}

}



async function updateUser(){

const newName = document.getElementById("newName").value;
const newPassword = document.getElementById("newPassword").value;

const url =
"/api/costumers/updateCostumer/"+currentUser.id+
"?name="+newName+
"&password="+newPassword;

const response = await fetch(url,{ method:"PUT" });

if(!response.ok){

alert("Ошибка обновления");
return;

}

alert("Данные обновлены");

}



async function loadUsers(){

const response = await fetch("/api/costumers");

const users = await response.json();

const table = document.getElementById("usersTable");

table.innerHTML="";

users.forEach(user=>{

const row=document.createElement("tr");

row.innerHTML=`
<td>${user.id}</td>
<td>${user.name}</td>
<td>${user.balance}</td>
`;

table.appendChild(row);

});

}

</script>

</body>

</html>
