<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ShopFood</title>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    input, button { margin: 5px 0; padding: 5px; }
    #dashboard { display: none; margin-top: 20px; }
    #foodList { list-style-type: none; padding-left: 0; }
    #foodList li { margin-bottom: 3px; }
    .error { color: red; }
</style>
</head>
<body>

<h2>Регистрация</h2>
<div id="registerContainer">
    <input type="text" id="regName" placeholder="Имя" />
    <input type="password" id="regPassword" placeholder="Пароль" />
    <button id="registerBtn">Зарегистрироваться</button>
    <div id="registerError" class="error"></div>
</div>

<h2>Вход</h2>
<div id="authContainer">
    <input type="text" id="loginName" placeholder="Имя" />
    <input type="password" id="loginPassword" placeholder="Пароль" />
    <button id="loginBtn">Войти</button>
    <div id="loginError" class="error"></div>
</div>

<div id="dashboard">
    <h2>Личный кабинет</h2>
    <p>Имя: <span id="userName"></span></p>
    <p>Баланс: <span id="userBalance"></span>₽</p>
    
    <h3>Список доступной еды и напитков:</h3>
    <button id="refreshFoodBtn">Обновить список</button>
    <ul id="foodList"></ul>
</div>

<script>
let currentUser = null;

// Регистрация
document.getElementById('registerBtn').onclick = () => {
    const name = document.getElementById('regName').value;
    const password = document.getElementById('regPassword').value;

    fetch('/ShopFood/registration', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, password })
    })
    .then(res => res.json())
    .then(data => {
        currentUser = data;
        document.getElementById('registerError').textContent = '';
        showDashboard();
    })
    .catch(err => {
        document.getElementById('registerError').textContent = err.message || "Ошибка регистрации";
    });
};

// Вход
document.getElementById('loginBtn').onclick = () => {
    const name = document.getElementById('loginName').value;
    const password = document.getElementById('loginPassword').value;

    fetch('/ShopFood/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, password })
    })
    .then(res => {
        if (!res.ok) throw new Error("Неверное имя или пароль");
        return res.json();
    })
    .then(data => {
        currentUser = data;
        document.getElementById('loginError').textContent = '';
        showDashboard();
    })
    .catch(err => {
        document.getElementById('loginError').textContent = err.message;
    });
};

// Показ личного кабинета
function showDashboard() {
    document.getElementById('authContainer').style.display = 'none';
    document.getElementById('registerContainer').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('userName').textContent = currentUser.name;
    document.getElementById('userBalance').textContent = currentUser.balance;

    loadFoodList(); // сразу загрузка еды
}

// Загрузка списка еды
function loadFoodList() {
    fetch('/ShopFood/getAllListFood?param=all')
        .then(res => res.json())
        .then(data => {
            const foodList = document.getElementById('foodList');
            foodList.innerHTML = '';
            data.forEach(food => {
                const li = document.createElement('li');
                li.textContent = `${food.nameFood} (${food.type}) — ${food.price}₽`;
                foodList.appendChild(li);
            });
        })
        .catch(err => console.error("Ошибка при загрузке еды:", err));
}

// Кнопка обновления списка еды
document.getElementById('refreshFoodBtn').onclick = () => {
    loadFoodList();
};
</script>

</body>
</html>
